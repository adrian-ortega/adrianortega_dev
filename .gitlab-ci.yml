stages:
  - test
  - docker

variables:
  DOCKER_BUILDKIT: "1"
  # Required for docker:dind on GitLab shared runners
  DOCKER_TLS_CERTDIR: ""

# -----------------------
# Tests / Build checks
# -----------------------
server:test:
  stage: test
  image: node:22-slim
  before_script:
    - corepack enable
    - corepack prepare yarn@1.22.22 --activate
  script:
    - cd apps/server
    - yarn install --frozen-lockfile
    - yarn test
  cache:
    key: server-yarn
    paths:
      - apps/server/node_modules/

web:build:
  stage: test
  image: node:22-slim
  before_script:
    - corepack enable
    - corepack prepare yarn@1.22.22 --activate
  script:
    - cd apps/web
    - yarn install --frozen-lockfile
    - yarn build
  cache:
    key: web-yarn
    paths:
      - apps/web/node_modules/

# -----------------------
# Docker build + push
# -----------------------
docker:build_and_push:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - |
      docker build \
        --build-arg CONTENT_REPO_URL="$CONTENT_REPO_URL" \
        --build-arg CONTENT_REPO_BRANCH="${CONTENT_REPO_BRANCH:-main}" \
        -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" \
        .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"

    # main branch => also push latest
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi

    # semver tag => also push tag + latest
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
        docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
        docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi
  rules:
    # build on main
    - if: '$CI_COMMIT_BRANCH == "main"'
    # build on semver tags like 1.2.3 (optionally with pre-release like 1.2.3-rc.1)
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$/'
