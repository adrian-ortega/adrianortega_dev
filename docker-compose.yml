services:
  app:
    image: ${REGISTRY_HOST}/adrianortega-dev:latest
    container_name: adrianortegadev
    restart: unless-stopped
    ports:
      - "5001:8080"
    environment:
      - APP_CONTENT_DIR=/app/content
      - APP_DATA_DIR=/app/data
      - SENTRY_DSN=${SENTRY_DSN}
    volumes:
      # Bind mount: markdown content lives on CASAORTEGA (\\CASAORTEGA\CasaShare\Apps),
      # reached via the host's CIFS mount of //192.168.0.234/CasaShare at /mnt/casashare
      - /mnt/casashare/Apps/content/adrianortega.dev:/app/content:ro
      # Named volume: persists the parsed-content JSON cache across restarts
      - data:/app/data

volumes:
  data:
