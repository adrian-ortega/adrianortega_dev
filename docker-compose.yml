services:
  app:
    image: registry.gitlab.com/adrian.ortega/adrianortega.dev:latest
    container_name: adrianortegadev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8080
      APP_PUBLIC_DIR: /app/apps/web/dist
      APP_ORIGIN: https://adrianortega.dev
    ports:
      - "5001:8080"
    volumes:
      - content:/app/content
      - data:/app/data

volumes:
  content:
  data:
