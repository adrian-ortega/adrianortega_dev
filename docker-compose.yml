services:
  app:
    image: registry.gitlab.com/adrian.ortega/adrianortega.dev:latest
    container_name: adrianortegadev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8080
      APP_ORIGIN: https://adrianortega.dev
    ports:
      - "8080:8080"
